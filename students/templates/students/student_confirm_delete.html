{% extends "base.html" %}
{% block title %}Delete {{ student.name }}{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Delete Student</h1>
    <p>Are you sure you want to delete <strong>{{ student.name }}</strong> ({{ student.roll_number }})? This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a href="{% url 'student-detail' student.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
